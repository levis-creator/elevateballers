      security:
        - cookieAuth: []
      parameters:
        - name: unread
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Array of contact messages
    post:
      tags: [Contact]
      summary: Submit a contact message
      description: |
        Public endpoint. Includes honeypot field `website` for spam prevention.
        Sends notification and auto-reply emails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  format: email
                  maxLength: 200
                message:
                  type: string
                  maxLength: 5000
                subject:
                  type: string
                website:
                  type: string
                  description: Honeypot — must be empty
      responses:
        '201':
          description: Message submitted
    patch:
      tags: [Contact]
      summary: Mark messages as read
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
