      summary: Send notification to subscribers
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, content]
              properties:
                subject:
                  type: string
                content:
                  type: string
                articleId:
                  type: string
      responses:
        '200':
          description: Notification sent

  /api/subscribers/unsubscribe:
    post:
      tags: [Subscribers]
      summary: Unsubscribe an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
      responses:
        '200':
          description: Unsubscribed

  # ─────────────────────────────────────────
  # REPORTS
  # ─────────────────────────────────────────
  /api/reports/generate:
    post:
      tags: [Reports]
      summary: Generate a report
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [standings, players, matches, season-summary]
                leagueId:
                  type: string
                seasonId:
                  type: string
                format:
                  type: string
                  enum: [pdf, csv, json]
      responses:
        '200':
          description: Report generated — returns report ID

  /api/reports/{id}/download:
    get:
      tags: [Reports]
      summary: Download a generated report
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Report file

  /api/reports/email:
    post:
      tags: [Reports]
      summary: Email a report to specified recipients
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportId, recipients]
              properties:
                reportId:
                  type: string
                recipients:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        '200':
          description: Email sent

  # ─────────────────────────────────────────
  # TOURNAMENTS
  # ─────────────────────────────────────────
  /api/tournaments/generate-bracket:
    post:
      tags: [Tournaments]
      summary: Generate a tournament bracket
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seasonId, bracketType]
              properties:
                seasonId:
                  type: string
                bracketType:
                  type: string
                  enum: [SINGLE_ELIMINATION, DOUBLE_ELIMINATION]
                teamIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Bracket generated

  /api/tournaments/preview-bracket:
    post:
      tags: [Tournaments]
      summary: Preview bracket without persisting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seasonId, bracketType]
              properties:
                seasonId:
                  type: string
                bracketType:
                  type: string
                teamIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bracket preview

  # ─────────────────────────────────────────
  # SETTINGS
  # ─────────────────────────────────────────
  /api/settings:
    get:
      tags: [Settings]
      summary: Get all site settings (admin)
      security:
        - cookieAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Array of settings
    post:
      tags: [Settings]
      summary: Update multiple settings
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Key-value pairs of settings
      responses:
        '200':
          description: Settings updated

  /api/settings/public:
    get:
      tags: [Settings]
      summary: Get public site settings (no auth)
      responses:
        '200':
          description: Public settings object

  /api/settings/{id}:
    get:
      tags: [Settings]
      summary: Get a single setting
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Setting object
    put:
      tags: [Settings]
      summary: Update a setting
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
      responses:
        '200':
          description: Updated setting

  /api/settings/rules-upload:
    post:
      tags: [Settings]
      summary: Upload a rules document
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Rules file uploaded

  /api/settings/rules-delete-upload:
    post:
      tags: [Settings]
      summary: Delete the rules document
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Rules file deleted

  # ─────────────────────────────────────────
  # FOLDERS
  # ─────────────────────────────────────────
  /api/folders:
    get:
      tags: [Folders]
      summary: List media folders
      parameters:
        - name: includePrivate
          in: query
          schema:
            type: boolean
          description: Include private folders (requires auth)
      responses:
        '200':
          description: Array of folders with media counts

  /api/folders/{id}:
    get:
      tags: [Folders]
      summary: Get a folder
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Folder object with media count

