        Creates folder if it doesn't exist.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                  description: Target folder name
      responses:
        '201':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  url:
                    type: string
                  thumbnail:
                    type: string
                    nullable: true
                  filePath:
                    type: string
                  size:
                    type: integer
                  compressionRatio:
                    type: number
                    nullable: true

