        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                logo:
                  type: string
                url:
                  type: string
      responses:
        '201':
          description: Sponsor created

  /api/highlights/sponsors/{id}:
    get:
      tags: [Highlights]
      summary: Get a sponsor
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Sponsor object
    put:
      tags: [Highlights]
      summary: Update a sponsor
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                logo:
                  type: string
                url:
                  type: string
      responses:
        '200':
          description: Updated sponsor

  # ─────────────────────────────────────────
  # FEATURE FLAGS
  # ─────────────────────────────────────────
  /api/feature-flags:
    get:
      tags: [Feature Flags]
      summary: Get all feature flags and their current state
      responses:
        '200':
          description: Object of flag name to boolean value
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: boolean

  # ─────────────────────────────────────────
  # MISC
  # ─────────────────────────────────────────
  /api/image-proxy:
    get:
      tags: [Misc]
      summary: Proxy and cache a remote image
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary

  /api/uploads/{path}:
    get:
      tags: [Misc]
      summary: Serve an uploaded file
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
          description: File path relative to uploads directory
      responses:
        '200':
          description: File content
        '404':
          description: File not found

  /api/openapi.json:
    get:
      tags: [Misc]
      summary: OpenAPI specification (this document)
      responses:
        '200':
          description: OpenAPI 3.1 JSON spec

  # ─────────────────────────────────────────
  # Reusable responses
  # ─────────────────────────────────────────
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID
