openapi: 3.1.0
info:
  title: Elevate Ballers API
  version: 1.0.0
  description: |
    REST API for the Elevate Ballers basketball league management platform.

    **Authentication:** Most write endpoints and admin-only read endpoints require a JWT stored in the `auth-token` cookie.
    Obtain a token via `POST /api/auth/login` or `POST /api/auth/verify-otp`.

    **Permissions:** Protected endpoints are annotated with the required permission string (e.g. `users:read`).
    The RBAC system uses the format `resource:action`.

servers:
  - url: http://localhost:4321
    description: Local development
  - url: https://elevateballers.com
    description: Production

tags:
  - name: Auth
    description: Authentication — login, logout, OTP, password reset
  - name: Users
    description: User account management
  - name: Teams
    description: Team CRUD and bulk operations
  - name: Players
    description: Player profiles and statistics
  - name: Matches
    description: Match scheduling and results
  - name: Games
    description: Live game state management
  - name: News
    description: News articles and publishing
  - name: Media
    description: Media gallery and file management
  - name: Upload
    description: File upload
  - name: Roles
    description: Role management
  - name: Permissions
    description: Permission listing
  - name: Audit Logs
    description: Audit trail
  - name: Contact
    description: Contact form messages
  - name: Leagues
    description: League management
  - name: Seasons
    description: Season management
  - name: Staff
    description: Staff member management
  - name: Comments
    description: Article comment management
  - name: Standings
    description: League standings
  - name: Subscribers
    description: Email subscriber management
  - name: Reports
    description: Report generation and download
  - name: Tournaments
    description: Tournament bracket generation
  - name: Settings
    description: Global site settings
  - name: Folders
    description: Media folder management
  - name: Highlights
    description: Highlights and sponsors
  - name: Feature Flags
    description: Feature flag configuration
  - name: Misc
    description: Image proxy, file downloads

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth-token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
          description: Stack trace (development only)

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        isSystem:
          type: boolean

    Permission:
      type: object
      properties:
        id:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string

    Team:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        logo:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        approved:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Player:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        slug:
          type: string
        image:
          type: string
          nullable: true
        position:
          type: string
          nullable: true
        jerseyNumber:
          type: integer
          nullable: true
        bio:
          type: string
          nullable: true
        height:
          type: string
          nullable: true
        weight:
          type: string
          nullable: true
        approved:
          type: boolean
        teamId:
          type: string
          nullable: true
        stats:
          type: object
          nullable: true

    Match:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
        status:
          type: string
          enum: [UPCOMING, LIVE, COMPLETED]
        stage:
          type: string
          nullable: true
          enum: [REGULAR_SEASON, PLAYOFF, QUARTER_FINALS, SEMI_FINALS, CHAMPIONSHIP, null]
        team1Score:
          type: integer
          nullable: true
        team2Score:
          type: integer
          nullable: true
        leagueId:
          type: string
          nullable: true
        seasonId:
          type: string
          nullable: true
        team1:
          $ref: '#/components/schemas/Team'
        team2:
          $ref: '#/components/schemas/Team'

    NewsArticle:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        category:
          type: string
        published:
          type: boolean
        feature:
          type: boolean
        image:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        author:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string

    Media:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [IMAGE, VIDEO, AUDIO, DOCUMENT]
        thumbnail:
          type: string
          nullable: true
        size:
          type: integer
          nullable: true
        featured:
          type: boolean
        isPrivate:
          type: boolean
        folderId:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    League:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        logo:
          type: string
          nullable: true
        active:
          type: boolean

    Season:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        leagueId:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        active:
          type: boolean
        bracketType:
          type: string
          nullable: true

    Staff:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        slug:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        approved:
          type: boolean

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        authorName:
          type: string
          nullable: true
        authorEmail:
          type: string
          nullable: true
        approved:
          type: boolean
        articleId:
          type: string
        parentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        userId:
          type: string
          nullable: true
        performedBy:
          type: string
          nullable: true
        source:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    GameState:
      type: object
      properties:
        matchId:
          type: string
        status:
          type: string
          enum: [UPCOMING, LIVE, COMPLETED]
        currentPeriod:
          type: integer
        clockSeconds:
          type: integer
          nullable: true
        clockRunning:
          type: boolean
        team1Score:
          type: integer
        team2Score:
          type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer

paths:
  # ─────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out current user
      description: Clears the `auth-token` cookie.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Successfully logged out

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify a 6-digit OTP
      description: Rate limited to 5 attempts per 15 minutes per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, otp]
              properties:
                userId:
                  type: string
                otp:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: OTP verified — returns user and sets auth-token cookie
        '400':
          description: Invalid or expired OTP
        '429':
          description: Rate limit exceeded

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password reset email
      description: Rate limited to 5 requests per 15 minutes per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent (always returns 200 to prevent user enumeration)
        '429':
          description: Rate limit exceeded

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using a token
      description: Validates the token, updates password, and invalidates all existing sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid or expired token

  # ─────────────────────────────────────────
  # USERS
  # ─────────────────────────────────────────
  /api/users:
    get:
      tags: [Users]
      summary: List all users
      description: Requires `users:read`. Optional role filter.
      security:
        - cookieAuth: []
      parameters:
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role name
      responses:
        '200':
          description: Array of users with roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: Create a new user
      description: Requires `users:create`. Sends a welcome / set-password email.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                roleIds:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: User created
        '409':
          description: Email already in use

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Get a single user
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Update a user
      description: Requires `users:update`. Invalidates sessions if user is deactivated.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                active:
                  type: boolean
      responses:
        '200':
          description: Updated user
    delete:
      tags: [Users]
      summary: Delete a user
      description: Requires `users:delete`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted

  /api/users/{id}/role:
    get:
      tags: [Users]
      summary: Get user roles
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Array of roles
    put:
      tags: [Users]
      summary: Assign roles to a user
      description: Requires `users:manage_roles`. Replaces all existing roles.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              properties:
                roleIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Roles updated

  # ─────────────────────────────────────────
  # TEAMS
  # ─────────────────────────────────────────
  /api/teams:
    get:
      tags: [Teams]
      summary: List teams
      description: Public shows approved teams only. Admin (with auth) sees all.
      parameters:
        - name: approved
          in: query
          schema:
            type: boolean
          description: Force approved-only filter
      responses:
        '200':
          description: Array of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
    post:
      tags: [Teams]
      summary: Create a team
      description: Requires `teams:create`. Admin-created teams are auto-approved.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                logo:
                  type: string
                description:
                  type: string
                approved:
                  type: boolean
      responses:
        '201':
          description: Team created

  /api/teams/{id}:
    get:
      tags: [Teams]
      summary: Get a single team
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Team object
    put:
      tags: [Teams]
      summary: Update a team
      description: Requires `teams:update`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Team'
      responses:
        '200':
          description: Updated team
    delete:
      tags: [Teams]
      summary: Delete a team
      description: Requires `teams:update`.
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted

  /api/teams/{id}/staff:
    get:
      tags: [Teams]
      summary: Get team staff members
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Array of staff assignments

  /api/teams/bulk-approve:
    post:
      tags: [Teams]
      summary: Bulk approve teams
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Teams approved

  /api/teams/bulk-delete:
    post:
      tags: [Teams]
      summary: Bulk delete teams
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Teams deleted

  # ─────────────────────────────────────────
  # PLAYERS
  # ─────────────────────────────────────────
  /api/players/leaders:
    get:
      tags: [Players]
      summary: Get stats leaders
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [points, assists, rebounds]
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: Array of player stats leaders

  /api/players/{id}/events:
    get:
      tags: [Players]
      summary: Get player match events
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Array of match events for this player

  /api/players/{id}/matches:
    get:
      tags: [Players]
      summary: Get player matches
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Array of matches the player participated in

  /api/players/{id}/playing-time:
    get:
      tags: [Players]
      summary: Get player playing time statistics
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Playing time stats

  /api/players/{id}/team-history:
    get:
      tags: [Players]
      summary: Get player team history
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Array of team history records

  /api/players/bulk-approve:
    post:
      tags: [Players]
      summary: Bulk approve players
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Players approved

  /api/players/bulk-delete:
    post:
      tags: [Players]
      summary: Bulk delete players
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Players deleted

  # ─────────────────────────────────────────
  # MATCHES
  # ─────────────────────────────────────────
  /api/matches:
    get:
      tags: [Matches]
      summary: List matches
      description: CORS enabled. Supports extensive filtering.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [UPCOMING, LIVE, COMPLETED]
        - name: stage
          in: query
          schema:
            type: string
            enum: [REGULAR_SEASON, PLAYOFF, QUARTER_FINALS, SEMI_FINALS, CHAMPIONSHIP]
        - name: leagueId
          in: query
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: string
        - name: seasonId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [date-asc, date-desc, league-asc, league-desc]
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Array of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Match'
    post:
      tags: [Matches]
      summary: Create a match
      description: Requires `matches:create`.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, leagueId]
              properties:
                date:
                  type: string
                  format: date-time
                team1Id:
                  type: string
                team2Id:
                  type: string
                team1Name:
                  type: string
                team2Name:
                  type: string
                leagueId:
                  type: string
                seasonId:
                  type: string
                stage:
                  type: string
                status:
                  type: string
                  enum: [UPCOMING, LIVE, COMPLETED]
      responses:
        '201':
          description: Match created

  /api/matches/{id}:
    get:
      tags: [Matches]
      summary: Get a single match
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Match object
    put:
      tags: [Matches]
      summary: Update a match
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Match'
      responses:
        '200':
          description: Updated match
    delete:
      tags: [Matches]
      summary: Delete a match
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted

  /api/matches/{matchId}/events/{id}:
    get:
      tags: [Matches]
      summary: Get a match event
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Match event object

  /api/matches/{matchId}/players/{id}:
    get:
      tags: [Matches]
      summary: Get match player stats
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Match player object

  /api/matches/{matchId}/stat-sheet:
    get:
      tags: [Matches]
      summary: Get stat sheet for a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stat sheet data

  /api/matches/{matchId}/images:
    get:
      tags: [Matches]
      summary: Get images associated with a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of media items

  /api/matches/bulk-delete:
    post:
      tags: [Matches]
      summary: Bulk delete matches
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Matches deleted

  # ─────────────────────────────────────────
  # GAMES (Live game tracking)
  # ─────────────────────────────────────────
  /api/games/{matchId}/state:
    get:
      tags: [Games]
      summary: Get current game state
      security:
        - cookieAuth: []
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game state object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameState'

  /api/games/{matchId}/play-by-play:
    get:
      tags: [Games]
      summary: Get play-by-play log
      security:
        - cookieAuth: []
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of game events in order

  /api/games/{matchId}/rules:
    get:
      tags: [Games]
      summary: Get game rules
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Game rules configuration

  /api/games/{matchId}/start:
    post:
      tags: [Games]
      summary: Start a game
      security:
        - cookieAuth: []
      parameters:
        - name: matchId
